onAuthStateChanged(auth, user => {

});

window.adminLogin = async () => {

  const p = document.getElementById('a-pass').value;
  try {

// ── Section picker ──
window.selectSection = (s) => {
  S.section = s;
  document.querySelectorAll('.sec-btn').forEach(b => b.classList.toggle('active', b.dataset.s === s));
  document.getElementById('admin-section-label').textContent = SECTIONS[s];
  openTab(S.tab);
};

// ── Tab picker ──
window.openTab = (tab) => {
  S.tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.t === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
  document.getElementById('pane-' + tab).style.display = 'block';
  if (tab === 'courses')  loadAdminCourses();
  if (tab === 'subjects') loadAdminSubjects();
  if (tab === 'codes')    renderCodesPane();
};

// ══════════════════════════════════════
//  ① COURSES
// ══════════════════════════════════════
async function loadAdminCourses() {
  const list = document.getElementById('admin-courses-list');
  list.innerHTML = '<div class="ld">جاري التحميل...</div>';
  const snap = await getDocs(query(collection(db,'sections',S.section,'courses'), orderBy('date','desc')));
  list.innerHTML = '';
  snap.forEach(d => {
    const c = {id:d.id,...d.data()};
    list.insertAdjacentHTML('beforeend', `
      <div class="row-item">
        <div class="row-info">
          <strong>${c.name||'دورة'}</strong>
          <span>${c.date||''}</span>
          ${c.isFree ? '<span class="badge-free">مجاني</span>' : '<span class="badge-paid">مدفوع</span>'}
        </div>
        <div class="row-actions">
          <button class="btn-sm btn-edit" onclick="editCourse('${c.id}','${c.name}','${c.date}',${c.isFree})">✏️</button>
          <button class="btn-sm btn-open" onclick="openCourse('${c.id}','${c.name}')">📚 مواد</button>
          <button class="btn-sm btn-del"  onclick="deleteCourse('${c.id}')">🗑️</button>
        </div>
      </div>`);
  });
}

window.showAddCourse = () => {

window.editCourse = (id,name,date,isFree) => {

  document.getElementById('course-form-id').value=id;

  document.getElementById('course-form-date').value=date;

  document.getElementById('modal-course-title').textContent='تعديل الدورة';
};
window.saveCourse = async () => {
  const id   = document.getElementById('course-form-id').value;
  const name = document.getElementById('course-form-name').value.trim();
  const date = document.getElementById('course-form-date').value.trim();
  const isFree = document.getElementById('course-form-free').checked;
  if (!name) return alert('أدخل اسم الدورة');
  const data = { name, date, isFree, updatedAt: new Date().toISOString() };
  if (id) await updateDoc(doc(db,'sections',S.section,'courses',id), data);
  else    await addDoc(collection(db,'sections',S.section,'courses'), data);
  closeModal('modal-course');

};
window.deleteCourse = async (id) => {
  if (!confirm('حذف الدورة؟')) return;
  await deleteDoc(doc(db,'sections',S.section,'courses',id));
  loadAdminCourses();
};

// ══════════════════════════════════════
//  ③ QUESTIONS (shared for course & lesson)
// ══════════════════════════════════════
function getQPath() {
  const src = document.getElementById('questions-pane').dataset.source;
  if (src==='course')
    return collection(db,'sections',S.section,'courses',S.courseId,'subjects',S.subjectId,'questions');
  return collection(db,'sections',S.section,'subjects',S.subjectId,'lessons',S.lessonId,'questions');
}
function getQDocPath(qId) {
  const src = document.getElementById('questions-pane').dataset.source;
  if (src==='course')
    return doc(db,'sections',S.section,'courses',S.courseId,'subjects',S.subjectId,'questions',qId);
  return doc(db,'sections',S.section,'subjects',S.subjectId,'lessons',S.lessonId,'questions',qId);
}

async function loadQuestions() {
  const list=document.getElementById('questions-list-admin');
  list.innerHTML='<div class="ld">جاري التحميل...</div>';
  const snap=await getDocs(query(getQPath(),orderBy('order')));
  list.innerHTML='';
  snap.forEach(d=>{
    const q={id:d.id,...d.data()};
    const isLesson = document.getElementById('questions-pane').dataset.source==='lesson';
    list.insertAdjacentHTML('beforeend',`
      <div class="q-admin-card">
        <div class="q-admin-header">
          <span class="order-badge">س ${q.order||''}</span>
          ${isLesson&&q.courseRef?`<span class="course-ref-badge">دورة ${q.courseRef}</span>`:''}
          <span class="type-badge ${q.type==='mcq'?'type-mcq':'type-flash'}">${q.type==='mcq'?'MCQ':'فلاش'}</span>
          ${q.isFree?'<span class="badge-free">مجاني</span>':''}
          <div class="row-actions" style="margin-right:auto">
            <button class="btn-sm btn-edit" onclick="editQuestion('${q.id}')">✏️ تعديل</button>
            <button class="btn-sm btn-del"  onclick="deleteQuestion('${q.id}')">🗑️</button>
          </div>
        </div>
        <div class="q-admin-body">
          ${q.text?`<p class="q-preview-text">${q.text}</p>`:''}
          ${q.imageUrl?`<img class="q-preview-img" src="${q.imageUrl}">`:''}
        </div>
        <div class="q-admin-answer">
          ${q.type==='mcq'
            ? `<span class="a-tag">🔤 الخيارات</span>
               ${(q.options||[]).map((o,i)=>`<p class="${i===q.correctIndex?'mcq-correct-opt':''}">${i+1}. ${o}</p>`).join('')}`
            : `<span class="a-tag">✅ الجواب</span>
               ${q.answerText?`<p>${q.answerText}</p>`:''}
               ${q.answerImageUrl?`<img class="q-preview-img" src="${q.answerImageUrl}">`:''}`
          }
        </div>
      </div>`);
  });
}

window.showAddQuestion=()=>{
  S.editingQ=null;
  document.getElementById('modal-question').style.display='flex';
  document.getElementById('modal-q-title').textContent='إضافة سؤال';
  clearQForm();
};
window.editQuestion=async(id)=>{
  const snap=await getDoc(getQDocPath(id));
  if(!snap.exists()) return;
  const q={id:snap.id,...snap.data()};
  S.editingQ=id;
  clearQForm();
  document.getElementById('modal-question').style.display='flex';
  document.getElementById('modal-q-title').textContent='تعديل السؤال';
  document.getElementById('q-form-order').value=q.order||'';
  document.getElementById('q-form-text').value=q.text||'';
  document.getElementById('q-form-course-ref').value=q.courseRef||'';
  document.getElementById('q-img-url').value=q.imageUrl||'';
  document.getElementById('q-form-free').checked=q.isFree||false;
  const qi=document.getElementById('q-img-preview');
  if(q.imageUrl){qi.src=q.imageUrl;qi.style.display='block';}else qi.style.display='none';
  const type=q.type||'flashcard';
  toggleQType(type);
  if(type==='flashcard'){
    document.getElementById('q-form-ans-text').value=q.answerText||'';
    document.getElementById('ans-img-url').value=q.answerImageUrl||'';
    const ai=document.getElementById('ans-img-preview');
    if(q.answerImageUrl){ai.src=q.answerImageUrl;ai.style.display='block';}else ai.style.display='none';
  } else {
    (q.options||[]).forEach((o,i)=>{ const el=document.getElementById('mcq-opt-'+(i+1)); if(el) el.value=o; });
    document.getElementById('mcq-correct').value=(q.correctIndex||0)+1;
  }
};
function clearQForm(){
  ['q-form-order','q-form-text','q-form-ans-text','q-form-course-ref','q-img-url','ans-img-url',
   'mcq-opt-1','mcq-opt-2','mcq-opt-3','mcq-opt-4']
    .forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('q-img-preview').style.display='none';
  document.getElementById('ans-img-preview').style.display='none';
  document.getElementById('mcq-correct').value='1';
  document.getElementById('q-form-free').checked=false;
  toggleQType('flashcard');
}

// Image URL preview
window.previewUrl=(inputId,previewId)=>{
  const url=document.getElementById(inputId).value.trim();
  const prev=document.getElementById(previewId);
  if(url){ prev.src=url; prev.style.display='block'; }
  else   { prev.style.display='none'; }
};

// ── Question type toggle ──
window.toggleQType = (type) => {
  document.getElementById('q-type-flashcard').classList.toggle('active', type==='flashcard');
  document.getElementById('q-type-mcq').classList.toggle('active', type==='mcq');
  document.getElementById('mcq-options-section').style.display = type==='mcq' ? 'block' : 'none';
  document.getElementById('ans-section').style.display = type==='flashcard' ? 'block' : 'none';
  document.getElementById('q-form-type').value = type;
};

window.saveQuestion=async()=>{
  const order        = parseInt(document.getElementById('q-form-order').value)||0;
  const text         = document.getElementById('q-form-text').value.trim();
  const imageUrl     = document.getElementById('q-img-url').value.trim()||null;
  const courseRef    = document.getElementById('q-form-course-ref').value.trim();
  const qType        = document.getElementById('q-form-type').value || 'flashcard';
  const isFreeQ      = document.getElementById('q-form-free').checked;

  if(!text && !imageUrl) return alert('أدخل نص السؤال أو رابط صورة');

  let data = {order, text, imageUrl, courseRef:courseRef||null, type:qType, isFree:isFreeQ};

  if (qType === 'flashcard') {
    data.answerText     = document.getElementById('q-form-ans-text').value.trim();
    data.answerImageUrl = document.getElementById('ans-img-url').value.trim()||null;
  } else {
    // MCQ
    const opts = [];
    for(let i=1;i<=4;i++){
      const t=document.getElementById('mcq-opt-'+i).value.trim();
      if(t) opts.push(t);
    }
    const correct = parseInt(document.getElementById('mcq-correct').value)||1;
    data.options = opts;
    data.correctIndex = correct - 1;
  }

  if(S.editingQ) await updateDoc(getQDocPath(S.editingQ), data);
  else           await addDoc(getQPath(), data);
  closeModal('modal-question');
  loadQuestions();
};

  subSelect.innerHTML = '<option value="">جاري التحميل...</option>';
  const snap = await getDocs(collection(db,'sections',S.section,'courses',courseId,'subjects'));
  subSelect.innerHTML = '<option value="">-- اختر مادة --</option>';
  snap.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.data().name || d.id;
    subSelect.appendChild(opt);
  });
};

window.doCopyQuestions = async () => {
  const courseId   = document.getElementById('copy-course-select').value;
  const subjectId  = document.getElementById('copy-subject-select').value;
  if(!courseId || !subjectId) return alert('اختر الدورة والمادة');
  const btn = document.getElementById('copy-confirm-btn');
  btn.textContent = 'جاري النسخ...'; btn.disabled=true;
  try {
    const snap = await getDocs(
      query(collection(db,'sections',S.section,'courses',courseId,'subjects',subjectId,'questions'), orderBy('order'))
    );
    let count=0;
    for(const d of snap.docs){
      const q={...d.data()};
      // add courseRef if not present
      if(!q.courseRef){
        const courseDoc=await getDoc(doc(db,'sections',S.section,'courses',courseId));
        q.courseRef = courseDoc.data()?.name || courseId;
      }
      await addDoc(getQPath(), q);
      count++;
    }
    closeModal('modal-copy-course');
    loadQuestions();
    alert('✅ تم نسخ '+count+' سؤال بنجاح');
  } catch(e){
    alert('خطأ: '+e.message);
  } finally { btn.textContent='نسخ الأسئلة'; btn.disabled=false; }
};

window.deleteQuestion=async(id)=>{
  if(!confirm('حذف السؤال؟')) return;
  await deleteDoc(getQDocPath(id));
  loadQuestions();
};

// ══════════════════════════════════════
//  ④ ACTIVATION CODES
// ══════════════════════════════════════
function renderCodesPane() {
  // just show the generator UI (already in HTML), load used codes
  loadUsedCodes();
}

window.generateCode=async()=>{
  const type    = document.getElementById('code-type').value;
  const section = document.getElementById('code-section').value;
  const subject = document.getElementById('code-subject').value.trim();
  const expires = document.getElementById('code-expires').value;

  // Generate random code: SEC-XXXXXX
  const rand = Math.random().toString(36).substring(2,8).toUpperCase();
  const prefix = section.toUpperCase().substring(0,3);
  const code = `${prefix}-${rand}`;

  const data = {
    type,       // 'section' | 'subject'
    section,
    subject: subject||null,
    expires: expires||null,
    used: false,
    createdAt: new Date().toISOString()
  };

  await setDoc(doc(db,'activation_codes',code), data);
  document.getElementById('generated-code-box').textContent = code;
  document.getElementById('generated-code-wrap').style.display='flex';
  loadUsedCodes();
};

window.copyCode=()=>{
  const code=document.getElementById('generated-code-box').textContent;
  navigator.clipboard.writeText(code).then(()=>alert('تم النسخ ✅'));
};

async function loadUsedCodes() {
  const list=document.getElementById('codes-history-list');
  list.innerHTML='<div class="ld">جاري التحميل...</div>';
  try {
    const snap=await getDocs(collection(db,'activation_codes'));
    list.innerHTML='';
    snap.forEach(d=>{
      const c={id:d.id,...d.data()};
      list.insertAdjacentHTML('beforeend',`
        <div class="row-item">
          <div class="row-info" style="flex-direction:column;align-items:flex-start;gap:2px">
            <code style="font-size:15px;font-weight:900;letter-spacing:1px">${c.id}</code>
            <span class="muted" style="font-size:11px">
              ${c.type==='section'?'قسم':'مادة'} ·
              ${c.section} ${c.subject?'· '+c.subject:''}
              ${c.expires?'· ينتهي '+c.expires:''}
            </span>
          </div>
          <div class="row-actions" style="flex-direction:column;align-items:flex-end">
            <span class="${c.used?'badge-paid':'badge-free'}">${c.used?'مستخدم':'متاح'}</span>
            <button class="btn-sm btn-del" style="margin-top:4px" onclick="deleteCode('${c.id}')">🗑️</button>
          </div>
        </div>`);
    });
    if(!snap.size) list.innerHTML='<div class="ld muted">لا توجد أكواد بعد</div>';
  } catch(e){ list.innerHTML='<div class="ld muted">خطأ في التحميل</div>'; }
}

window.deleteCode=async(id)=>{
  if(!confirm('حذف الكود؟')) return;
  await deleteDoc(doc(db,'activation_codes',id));
  loadUsedCodes();
};

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
window.closeModal=id=>{
  document.getElementById(id).style.display='none';
};
window.stopProp=e=>e.stopPropagation();

</script>
</head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--blue:#1040a0;--gold:#f0a500;--gray:#f0f4fa;--gray-mid:#d8e2f4;--text:#0a1628;--muted:#5a6a8a}
body{font-family:'Cairo',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}

.admin-header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-header h1{font-size:17px;font-weight:900}
.btn-logout{background:rgba(255,255,255,0.12);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-family:'Cairo',sans-serif;cursor:pointer;font-size:13px}

.section-picker{display:flex;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid var(--gray-mid)}
.sec-btn{flex:1;padding:9px;border:2px solid var(--gray-mid);border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted);transition:all .2s}
.sec-btn.active{border-color:var(--navy);background:var(--navy);color:#fff}

.tab-nav{display:flex;gap:0;background:#fff;border-bottom:2px solid var(--gray-mid)}
.tab-btn{flex:1;padding:12px;border:none;background:none;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

.admin-content{padding:16px;max-width:900px;margin:0 auto;width:100%}
.tab-pane{display:block}
.pane-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pane-toolbar h3{font-size:16px;font-weight:900;color:var(--navy)}

.sub-pane{background:#fff;border-radius:16px;padding:16px;border:2px solid var(--gray-mid)}
.sub-pane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sub-pane-header h4{font-size:14px;font-weight:800;color:var(--navy)}

.row-item{background:#fff;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;box-shadow:0 2px 10px rgba(10,22,40,0.07)}
.row-info{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.row-info strong{font-size:14px;color:var(--navy)}
.row-info span{font-size:12px;color:var(--muted)}
.row-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

.btn-sm{padding:6px 10px;border:none;border-radius:7px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;font-weight:700}
.btn-edit{background:#e3f2fd;color:#1565c0}
.btn-open{background:#e8f5e9;color:#2e7d32}
.btn-del{background:#ffebee;color:#c62828}
.btn-add{background:var(--navy);color:#fff;padding:9px 16px;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#1a3a6e,var(--blue));color:#fff;padding:12px 20px;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;width:100%}
.btn-cancel{background:var(--gray);color:var(--text);padding:12px 20px;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.modal-btns{display:flex;gap:10px;margin-top:16px}

.badge-free{background:#e8f5e9;color:#2e7d32;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.badge-paid{background:#fff3e0;color:#e65100;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.order-badge{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.course-ref-badge{background:var(--navy);color:#fff;font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700}

.admin-input{width:100%;padding:10px 12px;border:1.5px solid var(--gray-mid);border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;margin-top:6px;transition:border-color .2s}
.admin-input:focus{border-color:var(--blue)}
.admin-select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-mid);border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;margin-top:6px;background:#fff}
.admin-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-mid);border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;margin-top:6px;min-height:100px;resize:vertical;transition:border-color .2s}
.admin-textarea:focus{border-color:var(--blue)}
.admin-file{margin-top:6px;font-size:12px;width:100%}
.col-label{font-size:13px;font-weight:900;color:var(--navy);display:block;margin-bottom:8px;border-bottom:2px solid var(--gray-mid);padding-bottom:6px}

.modal-overlay{position:fixed;inset:0;background:rgba(10,22,40,0.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-box-wide{max-width:780px}

.q-admin-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid var(--gray-mid)}
.q-admin-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-admin-body{font-size:13px;color:var(--text);margin-bottom:8px}
.q-admin-answer{background:#e8f5e9;border-radius:8px;padding:10px;font-size:12px}
.a-tag{font-weight:700;color:#2e7d32;font-size:11px;margin-bottom:4px;display:block}
.q-preview-text{font-size:13px;line-height:1.6;margin-bottom:6px}
.q-preview-img{width:100%;border-radius:8px;margin-top:6px;max-height:200px;object-fit:contain}

.code-generator{background:#fff;border-radius:16px;padding:20px;border:1.5px solid var(--gray-mid);margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-row label{font-size:13px;font-weight:700;color:var(--navy)}

.ld{text-align:center;padding:32px;color:var(--muted);font-size:14px}
.muted{color:var(--muted)}
.type-toggle{display:flex;gap:8px;margin-bottom:4px}
.type-btn{flex:1;padding:9px;border:2px solid var(--gray-mid);border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted);transition:all .2s}
.type-btn.active{border-color:var(--navy);background:var(--navy);color:#fff}
.type-badge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700}
.type-flash{background:#e3f2fd;color:#1565c0}
.type-mcq{background:#f3e5f5;color:#6a1b9a}
.mcq-correct-opt{color:#2e7d32;font-weight:700}
</style>
</body>
</html>
